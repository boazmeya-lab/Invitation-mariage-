<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Mariage - Ellie & Henry</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f4f1ea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* Conteneur principal plein écran sur mobile */
        .screen-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* Taille d'un écran de téléphone */
            height: 100vh;
            max-height: 850px;
            background-color: #e3ded5;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- ENVELOPPE --- */
        .enveloppe-wrapper {
            position: absolute;
            width: 90%;
            height: 70%;
            perspective: 1000px;
            z-index: 10;
            transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out;
        }

        /* Le corps vert texturé de l'enveloppe */
        .enveloppe-corps {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80%;
            background-color: #2c4c38; /* Vert sapin chic comme sur l'image */
            border-radius: 0 0 12px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 3;
        }

        /* Le rabat (triangle du haut) */
        .enveloppe-rabat {
            position: absolute;
            top: 20%;
            left: 0;
            width: 100%;
            height: 45%;
            background-color: #223b2c; /* Vert un peu plus sombre */
            clip-path: polygon(0 0, 50% 100%, 100% 0); /* Crée la forme triangle */
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 5;
        }

        /* Le sceau de cire doré au milieu */
        .sceau-or {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: radial-gradient(circle, #f9d976 0%, #e9b646 60%, #b8860b 100%);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 0 8px #8b6508;
            border: 2px dashed #ffdf7a;
            cursor: pointer;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, opacity 0.4s ease;
        }

        .sceau-or::after {
            content: "♥";
            font-size: 24px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        .sceau-or:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* --- LA LETTRE / FAIRE-PART --- */
        .carte-invitation {
            position: absolute;
            bottom: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 25px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1;
            transform: translateY(0);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.4s;
            overflow-y: auto; /* Permet de scroller sur la lettre si le texte est long */
            text-align: center;
        }

        /* Image du couple */
        .couple-photo {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #dfdcd4;
        }

        .carte-invitation h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8c765c;
            margin-bottom: 10px;
        }

        .carte-invitation h1 {
            font-family: 'Times New Roman', serif;
            font-size: 32px;
            color: #2c4c38;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .carte-invitation .details {
            font-size: 15px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }

        .btn-action {
            display: inline-block;
            padding: 12px 25px;
            background-color: #2c4c38;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .btn-action:hover {
            background-color: #1e3527;
        }

        /* --- ANIMATIONS DE L'OUVERTURE --- */
        
        /* 1. Le rabat tourne vers le haut */
        .screen-container.open .enveloppe-rabat {
            transform: rotateX(180deg);
            z-index: 2;
        }

        /* 2. Le sceau disparaît doucement */
        .screen-container.open .sceau-or {
            opacity: 0;
            pointer-events: none;
        }

        /* 3. La lettre sort magnifiquement vers le haut et se place devant */
        .screen-container.open .carte-invitation {
            transform: translateY(-8%);
            z-index: 12;
            height: 95%;
        }

        /* 4. Légère descente de l'enveloppe vide pour laisser place au texte */
        .screen-container.open .enveloppe-wrapper {
            transform: translateY(15px);
        }
    </style>
</head>
<body>

    <div class="screen-container" id="mainContainer">
        
        <!-- L'enveloppe qui contient tout -->
        <div class="enveloppe-wrapper">
            <div class="enveloppe-rabat"></div>
            <div class="enveloppe-corps"></div>
            <!-- Le bouton d'ouverture (Sceau d'or) -->
            <div class="sceau-or" id="boutonOuvrir"></div>
        </div>

        <!-- Le Faire-Part caché (avec la photo et les infos) -->
        <div class="carte-invitation">
            <!-- REMPLACE CETTE IMAGE PAR LA PHOTO DU COUPLE -->
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600" alt="Couple" class="couple-photo">
            
            <h2>Save The Date</h2>
            <h1>Ellie & Henry</h1>
            
            <p class="details">
                Ont la joie de vous faire part de leur mariage.<br><br>
                <strong>Vendredi 10 Mai 2030 à 16h00</strong><br>
                123 Rue de l'Amour, Paris
            </p>
            
            <!-- Deuxième bouton / Lien vers le site ou formulaire RSVP -->
            <a href="https://www.google.com" target="_blank" class="btn-action">Confirmer ma présence</a>
        </div>

    </div>

    <!-- Musique de fond -->
    <audio id="maMusique" src="musique.mp3" preload="auto" loop></audio>

    <script>
        const container = document.getElementById('mainContainer');
        const bouton = document.getElementById('boutonOuvrir');
        const musique = document.getElementById('maMusique');

        // On ouvre l'enveloppe en cliquant sur le sceau d'or
        bouton.addEventListener('click', () => {
            container.classList.add('open');
            
            // Lancement de la chanson
            musique.play().catch(error => {
                console.log("Lecture audio bloquée ou fichier manquant:", error);
            });
        });
    </script>

</body>
</html>

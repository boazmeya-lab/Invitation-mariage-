<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Mariage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fdf6f0;
            font-family: 'Montserrat', sans-serif;
            color: #4a3f35;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Conteneur de l'intro vidéo */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4eae1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        /* La vidéo prend tout l'écran */
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bouton "Ouvrir" temporaire par-dessus la vidéo au début */
        #open-overlay {
            position: absolute;
            z-index: 1010;
            background: rgba(229, 152, 155, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Cacher l'intro */
        .intro-hidden #intro-container {
            opacity: 0;
            pointer-events: none;
        }

        /* Conteneur de l'invitation */
        #card-container {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s ease 0.5s, transform 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
            display: none;
        }

        .intro-hidden #card-container {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Style de la carte faire-part modernisé */
        .card {
            background: white;
            padding: 45px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(127, 85, 57, 0.08);
            border: 1px solid #e5d3b3; /* Jolie bordure dorée très fine */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #b7b7a4;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #a5a58d;
        }

        /* Petite ligne déco dorée */
        .divider {
            width: 50px;
            height: 1.5px;
            background: #e5989b;
            margin: 25px auto;
        }

        .details {
            font-size: 1rem;
            line-height: 1.8;
            color: #6b705c;
            margin-bottom: 25px;
        }

        /* Style bouton GPS élégant */
        .btn-location {
            display: inline-block;
            background: transparent;
            color: #7f5539;
            border: 1px solid #7f5539;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .btn-location:hover {
            background: #7f5539;
            color: white;
        }

        /* Compte à rebours */
        .countdown-container {
            margin: 35px 0;
        }

        .countdown-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #7f5539;
            letter-spacing: 1px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .time-box {
            background: #fddcd2;
            padding: 12px 15px;
            border-radius: 8px;
            min-width: 65px;
            box-shadow: 0 4px 10px rgba(253, 220, 210, 0.4);
        }

        .time-num {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            color: #e5989b;
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #b5838d;
            letter-spacing: 1px;
        }

        /* Bouton RSVP */
        .btn-rsvp {
            display: inline-block;
            background: #b7b7a4;
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(183, 183, 164, 0.3);
            margin-top: 15px;
            border: none;
            cursor: pointer;
        }

        .btn-rsvp:hover {
            background: #a5a58d;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(183, 183, 164, 0.4);
        }

        /* Contrôle audio */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border: 1px solid #ddd;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- INTRO VIDÉO DE L'ENVELOPPE -->
    <div id="intro-container" onclick="startExperience()">
        <div id="open-overlay">Ouvrir l'invitation</div>
        <video id="intro-video" playsinline muted>
            <source src="ouverture.mp4" type="video/mp4">
        </video>
    </div>

    <!-- LE FAIRE-PART DE MARIAGE -->
    <div id="card-container">
        <div class="card">
            <h1>S & C</h1>
            <p class="subtitle">Se disent Oui</p>
            
            <div class="divider"></div>

            <p class="details">
                Nous sommes heureux de vous inviter à célébrer notre union.<br>
                Rejoignez-nous pour partager ce moment magique.<br><br>
                <strong>Lieu :</strong> Nom de la Salle / Église, Ville
            </p>

            <!-- BOUTON GPS (Mets ton lien Google Maps ici !) -->
            <a href="https://maps.app.goo.gl/TON_LIEN_GOOGLE_MAPS" target="_blank" class="btn-location">
                📍 Voir l'itinéraire
            </a>

            <!-- COMPTE À REBOURS -->
            <div class="countdown-container">
                <p class="countdown-title">Le grand jour approche...</p>
                <div class="countdown">
                    <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Jours</span></div>
                    <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Heures</span></div>
                    <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">Min</span></div>
                    <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">Sec</span></div>
                </div>
            </div>

            <!-- BOUTON RSVP (Pense à mettre ton lien Tally final) -->
            <a href="https://tally.so/r/ton-propre-lien" target="_blank" class="btn-rsvp">
                Confirmer ma présence
            </a>
        </div>
    </div>

    <!-- MUSIQUE -->
    <audio id="music" loop>
        <source src="Ed Sheeran - Perfect (Official Music Video).mp3" type="audio/mpeg">
    </audio>

    <!-- BOUTON D'AUDIO FLOTTANT -->
    <div id="music-control" style="display: none;" onclick="toggleMusic()">
        🎵
    </div>

    <script>
        // CONFIGURATION DE LA DATE DU MARIAGE
        const weddingDate = new Date("June 20, 2027 15:00:00").getTime(); 

        const video = document.getElementById('intro-video');
        const overlay = document.getElementById('open-overlay');
        const music = document.getElementById('music');

        function startExperience() {
            overlay.style.display = 'none';

            music.play().then(() => {
                document.getElementById('music-control').style.display = 'flex';
            }).catch(err => console.log("Musique bloquée au départ :", err));

            video.play();

            video.onended = function() {
                document.body.classList.add('intro-hidden');
            };
        }

        function toggleMusic() {
            const ctrl = document.getElementById('music-control');
            if (music.paused) {
                music.play();
                ctrl.innerHTML = "🎵";
            } else {
                music.pause();
                ctrl.innerHTML = "🔇";
            }
        }

        // Script du Compte à rebours
        setInterval(function() {
            const diff = weddingDate - new Date().getTime();
            if (diff < 0) return;

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById("days").innerHTML = d;
            document.getElementById("hours").innerHTML = h;
            document.getElementById("minutes").innerHTML = m;
            document.getElementById("seconds").innerHTML = s;
        }, 1000);
    </script>
</body>
                    </html>

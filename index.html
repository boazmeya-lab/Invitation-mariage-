<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Mariage</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fdf6f0; font-family: 'Georgia', serif; }
        
        /* L'enveloppe */
        #envelope { width: 300px; height: 200px; background: #d4a373; position: relative; cursor: pointer; transition: 0.5s; border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        #seal { width: 60px; height: 60px; background: #e5989b; border-radius: 50%; border: 3px solid #fff; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }
        
        /* L'invitation cachée */
        #card { display: none; width: 80%; padding: 20px; background: white; text-align: center; border: 1px solid #ddd; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* Animation ouverture */
        .opened #envelope { display: none; }
        .opened #card { display: block; animation: fadeIn 1s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="envelope" onclick="openInvitation()">
        <div id="seal">S & C</div>
    </div>

    <div id="card">
        <h1>S & C</h1>
        <p>Nous avons la joie de vous inviter à notre mariage.</p>
        <button onclick="playMusic()">Voir le programme</button>
        <!-- Remplace l'URL ci-dessous par le lien de ton fichier audio si tu en as un -->
        <audio id="music" src="Ed Sheeran - Perfect (Official Music Video).mp3"></audio>
    
    </div>

    <script>
        function openInvitation() {
            document.body.classList.add('opened');
        }
        function playMusic() {
            document.getElementById('music').play();
        }
    </script>
</body>
</html>
